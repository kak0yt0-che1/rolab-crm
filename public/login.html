<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROLAB — Вход</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1>ROLAB</h1>
      <p class="subtitle">Система учета занятий</p>

      <div id="error-msg" class="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Логин</label>
          <input type="text" id="username" name="username" required autocomplete="username" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">Войти</button>
      </form>
    </div>
  </div>

  <script>
    // Check if already logged in
    const token = localStorage.getItem('rolab_token');
    if (token) {
      const user = JSON.parse(localStorage.getItem('rolab_user') || '{}');
      if (user.role === 'admin') {
        window.location.href = '/admin.html';
      } else if (user.role === 'dev') {
        window.location.href = '/dev.html';
      } else if (user.role === 'teacher') {
        window.location.href = '/teacher.html';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Вход...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Ошибка входа');
        }

        localStorage.setItem('rolab_token', data.token);
        localStorage.setItem('rolab_user', JSON.stringify(data.user));

        if (data.user.role === 'admin') {
          window.location.href = '/admin.html';
        } else if (data.user.role === 'dev') {
          window.location.href = '/dev.html';
        } else {
          window.location.href = '/teacher.html';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
