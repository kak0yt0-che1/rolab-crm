<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROLAB — Dev Panel</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/api.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="logo">ROLAB <span>| DEV</span></div>
    <div style="flex: 1"></div>
    <div class="user-info">
      <span id="header-user-name"></span>
      <button class="btn btn-outline btn-sm" onclick="API.logout()">Выйти</button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="app-sidebar">
      <nav class="app-nav">
        <a href="#users" class="active" data-page="users">Все пользователи</a>
        <a href="/admin.html">👉 Админ Панель (Полный Доступ)</a>
      </nav>
    </aside>

    <main class="app-content">
      <div class="page-section active" id="page-users">
        <div class="card">
          <div class="card-header">
            <h2>Все пользователи системы</h2>
          </div>
          <div class="card-body no-pad">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Роль</th>
                    <th>ФИО</th>
                    <th>Логин</th>
                    <th>Сырой пароль</th>
                    <th>Статус</th>
                  </tr>
                </thead>
                <tbody id="dev-users-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // AUTH CHECK
    const user = API.getUser();
    if (!user || user.role !== 'dev') {
      window.location.href = '/login.html';
    }
    document.getElementById('header-user-name').textContent = user.full_name;

    async function loadDevUsers() {
      try {
        const users = await API.get('/dev/users');
        const tbody = document.getElementById('dev-users-body');
        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td><strong>${u.role}</strong></td>
            <td>${escHtml(u.full_name)}</td>
            <td>${escHtml(u.username)}</td>
            <td><code>${escHtml(u.plain_password) || '❌ Нет (только хэш)'}</code></td>
            <td>${u.active ? '<span style="color:var(--success)">Активен</span>' : '<span style="color:var(--danger)">Удален</span>'}</td>
          </tr>
        `).join('');
      } catch (e) {
        alert(e.message);
      }
    }

    loadDevUsers();
  </script>
</body>
</html>
